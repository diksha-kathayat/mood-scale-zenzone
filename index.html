<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Force the underlying 'canvas' to be transparent */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            background-color: rgba(0,0,0,0) !important;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevents the webview from intercepting touches meant for the slider */
            pointer-events: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .mood-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Adjust padding-left/right to align with your mobile slider's edges */
            padding: 10px 15px;
        }

        .mood-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .emoji {
            font-size: 26px;
            margin-bottom: 2px;
        }

        .label {
            font-size: 10px;
            color: #666; /* Adjust color to contrast with your app's background */
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="mood-bar">
    <div class="mood-item"><span class="emoji">😠</span><span class="label">Very upset</span></div>
    <div class="mood-item"><span class="emoji">🙁</span><span class="label">Low</span></div>
    <div class="mood-item"><span class="emoji">😐</span><span class="label">Neutral</span></div>
    <div class="mood-item"><span class="emoji">🙂</span><span class="label">Good</span></div>
    <div class="mood-item"><span class="emoji">😄</span><span class="label">Happy</span></div>
</div>

</body>
</html>
